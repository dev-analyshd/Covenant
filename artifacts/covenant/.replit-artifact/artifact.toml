kind = "web"
previewPath = "/"
title = "Covenant — ZK Compliance Credentials"
version = "1.0.0"
id = "artifacts/covenant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21115

[services.development]
run = "pnpm --filter @workspace/covenant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/covenant", "run", "build" ]
publicDir = "artifacts/covenant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21115"
BASE_PATH = "/"
